<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REGISTER — PORTFOLIO</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.5s ease both;
    }

    .logo {
      font-size: 11px;
      letter-spacing: 0.35em;
      color: var(--green-dim);
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .logo a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }
    .logo a:hover { color: var(--green); }

    .logo-title {
      font-size: clamp(28px, 7vw, 46px);
      font-weight: bold;
      letter-spacing: 0.06em;
      line-height: 1;
      text-shadow: 0 0 18px var(--green-glow), 0 0 50px rgba(0,204,0,0.2);
      margin-bottom: 6px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--green-dark);
      letter-spacing: 0.2em;
      margin-bottom: 36px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 0 40px rgba(0,204,0,0.06), inset 0 0 30px rgba(0,204,0,0.03);
      padding: 36px 36px 30px;
    }

    .panel-header {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--green-dim);
      margin-bottom: 28px;
      text-transform: uppercase;
    }

    .panel-header::before {
      content: '// ';
      color: var(--green-dark);
    }

    /* requirement hints */
    .hint {
      font-size: 10px;
      color: var(--green-dark);
      letter-spacing: 0.08em;
      margin-top: -18px;
      margin-bottom: 18px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .actions .btn { flex: 1; text-align: center; padding: 13px; }

    .footer-link {
      text-align: center;
      margin-top: 22px;
      font-size: 12px;
      color: var(--green-dark);
      letter-spacing: 0.05em;
    }

    .footer-link a {
      color: var(--green-dim);
      text-decoration: none;
      border-bottom: 1px solid var(--green-dark);
      transition: color 0.2s, border-color 0.2s;
    }

    .footer-link a:hover {
      color: var(--green);
      border-color: var(--green);
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 1em;
      background: var(--green);
      vertical-align: text-bottom;
      margin-left: 3px;
      animation: blink 1s step-end infinite;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="logo"><a href="login.html">← 로그인으로</a></div>
    <div class="logo-title">REGISTER<span class="cursor"></span></div>
    <div class="logo-sub">// 새 계정 만들기</div>

    <div class="panel">
      <div class="panel-header">회원 정보 입력</div>

      <label>아이디</label>
      <input type="text" id="reg-id" placeholder="영문+숫자, 4~16자"
             autocomplete="username" maxlength="16" />
      <div class="hint">영문자와 숫자만 사용 가능 · 4~16자</div>

      <label>비밀번호</label>
      <input type="password" id="reg-pw" placeholder="4자 이상"
             autocomplete="new-password" />

      <label>비밀번호 확인</label>
      <input type="password" id="reg-pw2" placeholder="비밀번호를 다시 입력"
             autocomplete="new-password" />

      <label>닉네임</label>
      <input type="text" id="reg-nick" placeholder="게시판에 표시될 이름"
             maxlength="20"
             onkeydown="if(event.key==='Enter') doRegister()" />
      <div class="hint">최대 20자</div>

      <div class="err-msg" id="reg-err"></div>

      <div class="actions">
        <a class="btn btn-ghost" href="login.html">취소</a>
        <button class="btn" onclick="doRegister()">가입하기</button>
      </div>
    </div>

    <div class="footer-link">
      이미 계정이 있으신가요? <a href="login.html">로그인</a>
    </div>

  </div>

  <script src="auth.js"></script>
  <script>
    // 이미 로그인 상태면 메인으로
    Auth.redirectIfLoggedIn();

    function doRegister() {
      const id   = document.getElementById('reg-id').value.trim();
      const pw   = document.getElementById('reg-pw').value;
      const pw2  = document.getElementById('reg-pw2').value;
      const nick = document.getElementById('reg-nick').value.trim();
      const err  = document.getElementById('reg-err');
      err.textContent = '';

      const result = Auth.register(id, pw, pw2, nick);
      if (!result.ok) {
        err.textContent = result.msg;
        return;
      }

      // 가입 성공 (auth.js 내부에서 자동 로그인됨) → 메인으로
      location.href = 'index.html';
    }
  </script>
</body>
</html>
