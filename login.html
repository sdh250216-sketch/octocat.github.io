<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOGIN — PORTFOLIO</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* ── CARD ── */
    .card {
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.5s ease both;
    }

    /* ── LOGO ── */
    .logo {
      font-size: 11px;
      letter-spacing: 0.35em;
      color: var(--green-dim);
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .logo a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }
    .logo a:hover { color: var(--green); }

    .logo-title {
      font-size: clamp(36px, 8vw, 56px);
      font-weight: bold;
      letter-spacing: 0.06em;
      line-height: 1;
      text-shadow: 0 0 18px var(--green-glow), 0 0 50px rgba(0,204,0,0.2);
      margin-bottom: 6px;
      position: relative;
    }

    /* glitch accent line */
    .logo-title::after {
      content: 'LOGIN';
      position: absolute;
      inset: 0;
      color: var(--green);
      animation: glitch 4s infinite;
      opacity: 0.4;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--green-dark);
      letter-spacing: 0.2em;
      margin-bottom: 40px;
    }

    /* ── PANEL ── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 0 40px rgba(0,204,0,0.06), inset 0 0 30px rgba(0,204,0,0.03);
      padding: 36px 36px 30px;
    }

    .panel-header {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--green-dim);
      margin-bottom: 28px;
      text-transform: uppercase;
    }

    .panel-header::before {
      content: '// ';
      color: var(--green-dark);
    }

    /* ── ACTIONS ── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
    }

    .actions .btn { text-align: center; width: 100%; padding: 13px; }

    /* ── FOOTER LINK ── */
    .footer-link {
      text-align: center;
      margin-top: 22px;
      font-size: 12px;
      color: var(--green-dark);
      letter-spacing: 0.05em;
    }

    .footer-link a {
      color: var(--green-dim);
      text-decoration: none;
      border-bottom: 1px solid var(--green-dark);
      transition: color 0.2s, border-color 0.2s;
    }

    .footer-link a:hover {
      color: var(--green);
      border-color: var(--green);
    }

    /* ── CURSOR BLINK ── */
    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.1em;
      background: var(--green);
      vertical-align: text-bottom;
      margin-left: 3px;
      animation: blink 1s step-end infinite;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="logo"><a href="index.html">← 포트폴리오로</a></div>
    <div class="logo-title">LOGIN<span class="cursor"></span></div>
    <div class="logo-sub">// 20408 이희찬 포트폴리오</div>

    <div class="panel">
      <div class="panel-header">사용자 인증</div>

      <label>아이디</label>
      <input type="text" id="login-id" placeholder="your_id" autocomplete="username" />

      <label>비밀번호</label>
      <input type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()" />

      <div class="err-msg" id="login-err"></div>

      <div class="actions">
        <button class="btn" onclick="doLogin()">로그인</button>
      </div>
    </div>

    <div class="footer-link">
      계정이 없으신가요? <a href="register.html">회원가입</a>
    </div>

  </div>

  <script src="auth.js"></script>
  <script>
    // 이미 로그인 상태면 메인으로
    Auth.redirectIfLoggedIn();

    function doLogin() {
      const id  = document.getElementById('login-id').value.trim();
      const pw  = document.getElementById('login-pw').value;
      const err = document.getElementById('login-err');
      err.textContent = '';

      if (!id) { err.textContent = '아이디를 입력하세요.'; return; }
      if (!pw) { err.textContent = '비밀번호를 입력하세요.'; return; }

      const result = Auth.login(id, pw);
      if (!result.ok) {
        err.textContent = result.msg;
        document.getElementById('login-pw').value = '';
        document.getElementById('login-pw').focus();
        return;
      }

      // 성공 → 메인으로
      location.href = 'index.html';
    }
  </script>
</body>
</html>
